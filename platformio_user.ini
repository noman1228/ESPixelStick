[platformio]
default_envs = esp32_bigboi

[esp32_cust]
extends = esp32
build_type = release
build_flags =
    ${esp32.build_flags}
    -D SUPPORT_OLED
    -D FLASH_EXTRA_IMAGES
    -D ESPS_VERSION="4.xXx"
 ;   -DCORE_DEBUG_LEVEL=5
extra_scripts =
    ${esp32.extra_scripts}
    post:post_efu.py
lib_deps =
    ${esp32.lib_deps}
    olikraus/U8g2@^2.36.5
    Preferences

; big boi (pixel Rick)
[env:esp32_bigboi]
extends = esp32_cust
board = bigboi
build_flags =
    ${esp32_cust.build_flags}


; small man (trickle pixel)
[env:esp32_smallman]
extends = esp32_cust
board = smallman
build_flags =
    ${esp32_cust.build_flags}
    -D BOARD_NAME=\"esp32_smallman\"
    -D BOARD_ESP32_DEV4


; tiny dancer
[env:esp32_tiny]
extends = esp32_cust
board = tiny
build_flags =
    ${esp32_cust.build_flags}
    -D BOARD_NAME=\"esp32_tinydancer\"
    -D BOARD_ESP32_TINY
build_unflags =
    -D SUPPORT_OLED



; small man (trickle pixel)
[env:esp32_babyboi]
extends = esp32_cust
board = wemos_d1_mini32
build_flags =
    ${esp32_cust.build_flags}
    -D BOARD_NAME=\"esp32_babyboi\"
    -D BOARD_ESP32_D1JT

; pinoccio (cuz it has ethernet strings)
[env:esp32_teth]
extends = esp32_cust
board = freenove_esp32_wrover
build_flags = 
    ${esp32_cust.build_flags}
    -D BOARD_NAME=\"esp32_eth\"
    -D BOARD_ESP32_TETH




[alias:post_efu]
targets = buildprog, buildfs
