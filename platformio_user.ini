[platformio]
default_envs = esp32_bigboi, esp32_tiny, esp32_smallman, esp32_teth

[esp32_cust]
extends = esp32
build_type = debug
build_flags =
    ${esp32.build_flags}
    -D SUPPORT_OLED
    -D FLASH_EXTRA_IMAGES
    -D ESPS_VERSION="4.xXx"
    -DCORE_DEBUG_LEVEL=5
extra_scripts =
    ${env.extra_scripts}
    .scripts/replace_fs.py
    pre:.scripts/pio-version.py
    post:.scripts/CopyTargets.py


; big boi (pixel Rick)
[env:esp32_bigboi]
extends = esp32_cust
board = bigboi
board_build.f_flash= 80000000L
board_build.flash_mode = qio
build_flags =
    ${esp32_cust.build_flags}
    -D BOARD_NAME=\"esp32_BIGBOI\"
    -D BOARD_ESP32_WROVER



; small man (trickle pixel)
[env:esp32_smallman]
extends = esp32_cust
board = smallman
build_flags =
    ${esp32_cust.build_flags}
    -D BOARD_NAME=\"esp32_smallman\"
    -D BOARD_ESP32_DEV4


; tiny dancer
[env:esp32_tiny]
extends = esp32_cust
board = tiny
build_flags =
    ${esp32_cust.build_flags}
    -D BOARD_NAME=\"esp32_tinydancer\"
    -D BOARD_ESP32_TINY
build_unflags =
    -D SUPPORT_OLED



; small man (trickle pixel)
[env:esp32_babyboi]
extends = esp32_cust
board = wemos_d1_mini32
build_flags =
    ${esp32_cust.build_flags}
    -D BOARD_NAME=\"esp32_babyboi\"
    -D BOARD_ESP32_D1JT

; pinoccio (cuz it has ethernet strings)
[env:esp32_teth]
extends = esp32_cust
board = bigboi
build_flags = 
    ${esp32_cust.build_flags}
    -D BOARD_NAME=\"esp32_eth\"
    -D BOARD_ESP32_TETH

