[platformio]
default_envs = esp32_bigboi, esp32_tiny, esp32_smallman
platforms_dir = ./.pio/platforms

[esp32_cust]
extends = esp32
platform_packages = framework-arduinoespressif32
framework = arduino
build_flags =
    ${esp32.build_flags}
    ${env.build_flags}
    -fexceptions
    -DSUPPORT_OLED=1
    -DFLASH_EXTRA_IMAGES=1
    
lib_deps =
    ${env.lib_deps}
    olikraus/U8g2@^2.36.2

; small man (trickle pixel)
[env:esp32_smallman]
extends = esp32_cust
board = az-delivery-devkit-v4
build_flags =
    ${esp32_cust.build_flags}
    -DBOARD_NAME='"esp32_smallman"'
    -D BOARD_ESP32_DEV4
    -D SUPPORT_OLED
;    -D FLASH_EXTRA_IMAGES


; big boi (pixel Rick)
[env:esp32_bigboi]
extends = esp32_cust
board = freenove_esp32_wrover
build_flags =
    ${esp32_cust.build_flags}
    -D BOARD_NAME='"esp32_BIGBOI"'
    -D BOARD_ESP32_WROVER

; tiny dancer
[env:esp32_tiny]
extends = esp32_cust
board = esp32doit-devkit-v1
build_flags =
    ${esp32_cust.build_flags}
    -D BOARD_NAME='"esp32_tinydancer"'
    -D BOARD_ESP32_DEV4


[env:esp32_teth]
extends = esp32_cust
board = freenove_esp32_wrover
build_flags = 
    ${esp32_cust.build_flags}
    -D BOARD_NAME='"esp32_eth"'
    -D BOARD_ESP32_TETH
    -I ./.pio/packages/framework-arduinoespressif32/libraries/Ethernet/src
upload_resetmethod = rts
upload_protocol = esptool
monitor_rts = 0
monitor_dtr = 0