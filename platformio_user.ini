
[env]
lib_deps =
    adafruit/Adafruit PWM Servo Driver Library @ ^2.4.0
    bblanchon/ArduinoJson @ 7.3.0
    djgrrr/Int64String @ ^1.1.1
    forkineye/ESPAsyncE131 @ ^1.0.5
    greiman/SdFat @ ^2.2.3
    mathieucarbou/ESPAsyncWebServer @ ^3.3.23
    ottowinter/AsyncMqttClient-esphome @ ^0.8.6
    paulstoffregen/Time @ ^1.6.1
    https://github.com/MartinMueller2003/Artnet
    https://github.com/MartinMueller2003/Espalexa
    https://github.com/MartinMueller2003/SimpleFTPServer
    https://github.com/bitbank2/unzipLIB
    olikraus/U8g2@^2.36.2




; small man (trickle pixel)
[env:esp32_dev4]
extends = esp32git
board = az-delivery-devkit-v4
board_build.flash_mode = qio
board_build.f_flash = 80000000L
build_flags =
    ${esp32git.build_flags}
    -DBOARD_NAME='"esp32_smallman"'
    -D BOARD_ESP32_DEV4


; big boi (pixel Rick)
[env:esp32_bigboi]
extends = esp32git
board = freenove_esp32_wrover
board_build.flash_mode = qio
board_build.f_flash = 80000000L
upload_port = COM7
build_flags =
    ${esp32git.build_flags}
    -D BOARD_NAME='"esp32_BIGBOI"'
    -D BOARD_ESP32_WROVER
    -D SUPPORT_OLED

; tiny dancer
[env:esp32_tiny]
extends = esp32git
board = esp32dev
board_build.flash_mode = qio
board_build.f_flash = 80000000L
build_flags =
    ${esp32git.build_flags}
    -D BOARD_NAME='"esp32_devkitc"'
    -D BOARD_ESP32_dev4

; big boi (pixel Rick)
[env:esp32_bigboi_dev]
extends = esp32git
board = freenove_esp32_wrover
board_build.flash_mode = qio
board_build.f_flash = 80000000L
build_type = debug
debug_tool = esp-prog
upload_port = COM7
build_flags =
    ${esp32git.build_flags}
    -D BOARD_NAME='"esp32_BIGBOI"'
    -D BOARD_ESP32_WROVER
    -D SUPPORT_OLED

