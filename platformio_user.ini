[platformio]
default_envs = jmt_controller
src_dir = ./src
data_dir = ./data
build_cache_dir = ./.pio/.buildcache
packages_dir = ./.pio/packages
cache_dir = ./.pio/cache
extra_configs = platformio_user.ini

[esp32_cust]
extends = esp32
build_type = release
board_build.partitions = ESP32_partitions.csv
board_build.flash_mode = dio
board_build.f_flash = 80000000L
build_flags =
    ${esp32.build_flags}
    -D ENABLE_DEDICATED_SPI=0
    -D SECRETS_SSID=\"xlights\"
    -D SECRETS_PASS=\"christmas2024\"
    -D SUPPORT_OLED=1
    -D FLASH_EXTRA_IMAGES=1
   ; -D ESPS_VERSION=\"4.xXx\"
 ;   -DCORE_DEBUG_LEVEL=5
lib_deps =
    ${esp32.lib_deps}   
    olikraus/U8g2@^2.36.8
extra_scripts = 
    ${esp32.extra_scripts}
    post_efu.py
build_unflags =
    ${env.build_unflags}
    -D BOARD_HAS_PSRAM
    -D SUPPORT_FTP
    -D ENABLE_DEDICATED_SPI=0
    -mfix-esp32-psram-cache-issue
    -mfix-esp32-psram-cache-strategy=memw
    
[env:jmt_controller]
extends = esp32_cust
board = wrover
build_flags =
    ${esp32_cust.build_flags}
    -D BOARD_NAME=\"JMT_CONTROLLER\"
    -D BOARD_ESP32_JMT
    -D SUPPORT_OLED

; tiny dancer
[env:jmt_matrix]
extends = esp32_cust
board = d1clone
build_flags =
    ${esp32_cust.build_flags}
    -D BOARD_NAME=\"jmt_matrix\"
    -D BOARD_ESP32_JMTMATRIX
    
[alias:post_efu]
targets = buildprog, buildfs

