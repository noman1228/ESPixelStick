
; big boi (pixel Rick)
[env:esp32_bigboi]
extends = esp32_cust
board = freenove_esp32_wrover
build_flags =
    ${esp32_cust.build_flags}
    -D BOARD_NAME='"esp32_BIGBOI"'
    -D BOARD_ESP32_WROVER
    -DBOARD_HAS_PSRAM
upload_port = COM52

; tiny dancer
[env:esp32_tiny]
extends = esp32_cust
board = esp32doit-devkit-v1
build_flags =
    ${esp32_cust.build_flags}
    -D BOARD_NAME='"esp32_tinydancer"'
    -D BOARD_ESP32_DEV4


; small man (trickle pixel)
[env:esp32_smallman]
extends = esp32_cust
board = az-delivery-devkit-v4
build_flags =
    ${esp32_cust.build_flags}
    -DBOARD_NAME='"esp32_smallman"'
    -D BOARD_ESP32_DEV4
    -D SUPPORT_OLED


; pinoccio (cuz it has ethernet strings)
[env:esp32_teth]
extends = esp32_cust
board = freenove_esp32_wrover
build_flags = 
    ${esp32_cust.build_flags}
    -D BOARD_NAME='"esp32_eth"'
    -D BOARD_ESP32_TETH
    -I ./include/newidf
upload_resetmethod = rts
upload_protocol = esptool
monitor_rts = 0
monitor_dtr = 0



[platformio]
default_envs = esp32_bigboi, esp32_tiny, esp32_smallman
platforms_dir = ./.pio/platforms

[esp32_cust]
extends = esp32
framework = arduino
build_flags =
;    -D ENABLE_DEDICATED_SPI=1 ; instruct SdFat to take ownership of the spi device
    -D SDFAT_FILE_TYPE=3 ; SdFat full support
    -D USE_LONG_FILE_NAMES=1 ; SdFat
    -D MAINTAIN_FREE_CLUSTER_COUNT=1 ; SdFat
    -D CHECK_FLASH_PROGRAMMING=0 ; SdFat
    -D INCLUDE_SDIOS=1 ; SdFat
    -D NOBYFOUR=1 ; reduced unzip table size
    -D DISABLE_FS_H_WARNING=1
    -I ./src
    -I ./include
    -mtext-section-literals
    -Wl,-Map=firmware.map
    -Wl,--cref
    ${esp32.build_flags}
    -fexceptions
    -DSUPPORT_OLED
    -DFLASH_EXTRA_IMAGES
    -DESPS_VERSION='4.xXx'    
lib_deps =
    ${env.lib_deps}
    olikraus/U8g2@^2.36.2
lib_ignore =
    ${env.lib_ignore}
    ESP Async WebServer	; force the use of the esphome version
    AsyncTCP			; force the use of the esphome version
    LittleFS_esp32		; force the use of the ESP32 built into the core version
