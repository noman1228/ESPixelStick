[platformio]
default_envs = esp32_bigboi, esp32_tiny, esp32_smallman

; small man (trickle pixel)
[env:esp32_smallman]
extends = esp32
board = az-delivery-devkit-v4
build_flags =
    ${esp32.build_flags}
    -DBOARD_NAME='"esp32_smallman"'
    -D BOARD_ESP32_DEV4
    -D SUPPORT_OLED
    -D FLASH_EXTRA_IMAGES
lib_deps =
    ${env.lib_deps}
    olikraus/U8g2@^2.36.2

; big boi (pixel Rick)
[env:esp32_bigboi]
extends = esp32
board = freenove_esp32_wrover
build_flags =
    ${esp32.build_flags}
    -D BOARD_NAME='"esp32_BIGBOI"'
    -D BOARD_ESP32_WROVER
    -D SUPPORT_OLED
    -D FLASH_EXTRA_IMAGES
lib_deps =
    ${env.lib_deps}
    olikraus/U8g2@^2.36.2

; tiny dancer
[env:esp32_tiny]
extends = esp32
board = esp32doit-devkit-v1
build_flags =
    ${esp32.build_flags}
    -D BOARD_NAME='"esp32_tinydancer"'
    -D BOARD_ESP32_DEV4
lib_deps =
    ${env.lib_deps}
    olikraus/U8g2@^2.36.2


[env:esp32_teth]
extends = esp32
board = freenove_esp32_wrover
build_flags = 
    ${esp32.build_flags}
    -D BOARD_NAME='"esp32_eth"'
    -D BOARD_ESP32_TETH
    -D SUPPORT_OLED
lib_deps =
    ${env.lib_deps}
    olikraus/U8g2@^2.36.2
upload_resetmethod = rts
upload_protocol = esptool
monitor_rts = 0
monitor_dtr = 0