; small man (trickle pixel)
[env:esp32_dev4]
extends = esp32git
board = az-delivery-devkit-v4
board_build.flash_mode = qio
board_build.f_flash = 80000000L
build_flags =
    ${esp32git.build_flags}
    -DBOARD_NAME='"esp32_smallman"'
    -D BOARD_ESP32_DEV4
lib_deps =
    ${env.lib_deps}
    olikraus/U8g2@^2.36.2

; big boi (pixel Rick)
[env:esp32_bigboi]
extends = esp32git
board = freenove_esp32_wrover
board_build.flash_mode = qio
board_build.f_flash = 80000000L
build_flags =
    ${esp32git.build_flags}
    -D BOARD_NAME='"esp32_BIGBOI"'
    -D BOARD_ESP32_WROVER
    -D SUPPORT_OLED
lib_deps =
    ${env.lib_deps}
    olikraus/U8g2@^2.36.2

; tiny dancer
[env:esp32_tiny]
extends = esp32
board = esp32doit-devkit-v1
build_flags =
    ${esp32git.build_flags}
    -D BOARD_NAME='"esp32_tinydancer"'
    -D BOARD_ESP32_dev4
lib_deps =
    ${env.lib_deps}
    olikraus/U8g2@^2.36.2

; big boi (pixel Rick)
[env:esp32_bigboi_dev]
extends = esp32git
board = freenove_esp32_wrover
board_build.flash_mode = qio
board_build.f_flash = 80000000L
build_type = debug
debug_tool = esp-prog
upload_port = COM7
build_flags =
    ${esp32git.build_flags}
    -D BOARD_NAME='"esp32_BIGBOI"'
    -D BOARD_ESP32_WROVER
    -D SUPPORT_OLED
lib_deps =
    ${env.lib_deps}
    olikraus/U8g2@^2.36.2
